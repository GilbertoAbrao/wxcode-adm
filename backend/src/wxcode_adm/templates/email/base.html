<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WXCODE{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f5; padding: 32px 0;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%;">

          <!-- Header bar -->
          <tr>
            <td style="background-color: #18181b; padding: 24px 40px; border-radius: 8px 8px 0 0;">
              <span style="color: #f4f4f5; font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;">WXCODE</span>
            </td>
          </tr>

          <!-- Content area -->
          <tr>
            <td style="background-color: #ffffff; padding: 40px; border-radius: 0 0 8px 8px; color: #27272a; font-size: 15px; line-height: 1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 40px; text-align: center;">
              <p style="margin: 0; color: #71717a; font-size: 12px; line-height: 1.5;">&copy; 2026 WXCODE. All rights reserved.</p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
