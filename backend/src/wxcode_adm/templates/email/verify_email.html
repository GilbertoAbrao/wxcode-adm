{% extends "base.html" %}

{% block title %}Verify your email — WXCODE{% endblock %}

{% block content %}
  <h2 style="margin: 0 0 16px 0; color: #18181b; font-size: 20px; font-weight: 700;">Verify your email address</h2>
  <p style="margin: 0 0 24px 0;">Use the code below to verify your email. It expires in <strong>10 minutes</strong>.</p>

  <!-- OTP code block -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 0 0 24px 0;">
    <tr>
      <td align="center">
        <div style="display: inline-block; background-color: #f4f4f5; border-radius: 6px; padding: 24px 32px; font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #18181b;">{{ code }}</div>
      </td>
    </tr>
  </table>

  <p style="margin: 0; color: #71717a; font-size: 13px;">If you did not create a WXCODE account, ignore this email.</p>
{% endblock %}
